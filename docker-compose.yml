services:
  mysql:
    image: mysql:8.4
    container_name: dog-social-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dog_social}
      MYSQL_USER: ${MYSQL_USER:-dogsocial}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dogsocial}
    ports:
      - "3307:3306"
    volumes:
      - dog_social_mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
    container_name: dog-social-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-dog_social}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-dogsocial}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-dogsocial}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me}
      APP_JWT_EXPIRATION_SECONDS: ${APP_JWT_EXPIRATION_SECONDS:-604800}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: 60000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - dog_social_uploads:/app/uploads

volumes:
  dog_social_mysql_data:
  dog_social_uploads:

