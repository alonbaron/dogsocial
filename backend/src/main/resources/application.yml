server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:15MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dog_social?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:dogsocial}
    password: ${SPRING_DATASOURCE_PASSWORD:dogsocial}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-env}
    expirationSeconds: ${APP_JWT_EXPIRATION_SECONDS:604800} # 7 days
  cors:
    allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://dogsocial.vercel.app}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  passwordReset:
    frontendResetUrl: ${APP_PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
    tokenTtlMinutes: ${APP_PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    emailCooldownMinutes: ${APP_PASSWORD_RESET_EMAIL_COOLDOWN_MINUTES:5}
    ipHourlyLimit: ${APP_PASSWORD_RESET_IP_HOURLY_LIMIT:10}
    fromEmail: ${APP_PASSWORD_RESET_FROM_EMAIL:no-reply@pawpals.local}
  emailjs:
    serviceId: ${EMAILJS_SERVICE_ID:}
    templateId: ${EMAILJS_TEMPLATE_ID:}
    publicKey: ${EMAILJS_PUBLIC_KEY:}

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:warn}

